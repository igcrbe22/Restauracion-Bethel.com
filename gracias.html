<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! — Restauración Bethel</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Jost',sans-serif;background:linear-gradient(135deg,#f4f9fd,#e8f0f7);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
    .card{background:white;border-radius:24px;padding:3rem;max-width:500px;text-align:center;box-shadow:0 20px 60px rgba(91,164,207,0.2)}
    .icon{width:80px;height:80px;background:linear-gradient(135deg,#5bafd6,#2e6b9e);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;color:white;font-size:2rem}
    h1{font-family:'Cormorant Garamond',serif;font-size:2rem;color:#1b3a5c;margin-bottom:1rem}
    p{color:#4a6f8a;line-height:1.7;margin-bottom:2rem}
    .btn{display:inline-block;background:linear-gradient(135deg,#5bafd6,#2e6b9e);color:white;padding:1rem 2.5rem;border-radius:50px;text-decoration:none;font-weight:600;transition:transform .2s}
    .btn:hover{transform:translateY(-2px)}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>¡Mensaje Enviado!</h1>
    <p>Gracias por contactarnos. Hemos recibido tu mensaje y uno de nuestros pastores se comunicará contigo lo antes posible.</p>
    <p><small>🕊️ "Él restaura mi alma" — Salmos 23:3</small></p>
    <a href="index.html" class="btn">Volver al inicio</a>
  </div>
</body>
</html>
